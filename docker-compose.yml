services:
  mimo-tts-legado:
    build: .
    container_name: mimo-tts-legado
    restart: unless-stopped
    ports:
      - "9880:9880"
    env_file:
      - .env
    environment:
      # Required: MIMO-TTS API
      - API_BASE_URL=${API_BASE_URL:-https://api.xiaomimimo.com/v1}
      - API_KEY=${API_KEY}
      # Required: Legado Basic Auth
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      # Optional: TTS
      - MODEL=${MODEL:-mimo-v2.5-tts}
      - DEFAULT_VOICE=${DEFAULT_VOICE:-晓晓}
      - DEFAULT_STYLE=${DEFAULT_STYLE:-温柔，语速适中}
      - TIMEOUT_SECS=${TIMEOUT_SECS:-60}
      - MAX_TEXT_LENGTH=${MAX_TEXT_LENGTH:-5000}
      - OUTPUT_FORMAT=${OUTPUT_FORMAT:-wav}
      # Optional: Server
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-1048576}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
